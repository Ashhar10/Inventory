<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Inventory Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            perspective: 1500px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            transform-style: preserve-3d;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 3em;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .stat-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .stat-card:nth-child(1) .stat-icon { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #43e97b, #38f9d7); }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .inventory-table-container, .chart-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.8s ease;
        }

        .section-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr {
            transition: all 0.3s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            transform: translateX(5px);
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-in-stock { background: #43e97b; color: white; }
        .status-low-stock { background: #f5576c; color: white; }
        .status-out-stock { background: #666; color: white; }

        .chart-3d {
            position: relative;
            height: 400px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px;
            perspective: 1000px;
        }

        .bar-3d {
            width: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px 10px 0 0;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .bar-3d:hover {
            transform: translateY(-10px) rotateY(10deg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .bar-3d::before {
            content: attr(data-value);
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: #333;
            font-size: 1.2em;
        }

        .bar-label {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            color: #666;
            font-weight: bold;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            transform: scale(0.7);
            transition: transform 0.3s;
            box-shadow: 0 30px 90px rgba(0,0,0,0.5);
        }

        .modal.active {
            display: flex;
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 3D Inventory System</h1>
            <p>Real-time Inventory Management Dashboard</p>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-icon">📦</div>
                <div class="stat-value" id="totalItems">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="inStock">0</div>
                <div class="stat-label">In Stock</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value" id="lowStock">0</div>
                <div class="stat-label">Low Stock</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="totalValue">$0</div>
                <div class="stat-label">Total Value</div>
            </div>
        </div>

        <div class="main-content">
            <div class="inventory-table-container">
                <h2 class="section-title">📋 Inventory List</h2>
                <div class="controls">
                    <input type="text" id="searchInput" placeholder="🔍 Search items...">
                    <select id="filterStatus">
                        <option value="all">All Status</option>
                        <option value="in-stock">In Stock</option>
                        <option value="low-stock">Low Stock</option>
                        <option value="out-stock">Out of Stock</option>
                    </select>
                    <button onclick="openModal()">➕ Add Item</button>
                </div>
                <div style="overflow-x: auto;">
                    <table id="inventoryTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Product Name</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="section-title">📊 Stock Overview</h2>
                <div class="chart-3d" id="chart3d"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="itemModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Add New Item</h2>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="Enter product name">
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" placeholder="Enter quantity" min="0">
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" id="price" placeholder="Enter price" min="0" step="0.01">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 30px;">
                <button onclick="addItem()" style="flex: 1;">Add Item</button>
                <button onclick="closeModal()" style="flex: 1; background: #666;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = [
            { id: 1, name: 'Laptop Pro X1', quantity: 45, price: 1299.99 },
            { id: 2, name: 'Wireless Mouse', quantity: 120, price: 29.99 },
            { id: 3, name: 'Mechanical Keyboard', quantity: 8, price: 149.99 },
            { id: 4, name: 'USB-C Hub', quantity: 200, price: 49.99 },
            { id: 5, name: 'Monitor 27"', quantity: 0, price: 399.99 },
            { id: 6, name: 'Webcam HD', quantity: 65, price: 89.99 }
        ];

        function getStatus(qty) {
            if (qty === 0) return 'out-stock';
            if (qty < 20) return 'low-stock';
            return 'in-stock';
        }

        function getStatusText(qty) {
            if (qty === 0) return 'Out of Stock';
            if (qty < 20) return 'Low Stock';
            return 'In Stock';
        }

        function updateStats() {
            const total = inventory.length;
            const inStock = inventory.filter(i => i.quantity >= 20).length;
            const lowStock = inventory.filter(i => i.quantity > 0 && i.quantity < 20).length;
            const totalValue = inventory.reduce((sum, i) => sum + (i.quantity * i.price), 0);

            document.getElementById('totalItems').textContent = total;
            document.getElementById('inStock').textContent = inStock;
            document.getElementById('lowStock').textContent = lowStock;
            document.getElementById('totalValue').textContent = '$' + totalValue.toFixed(2);
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterStatus').value;

            let filtered = inventory.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(search);
                const status = getStatus(item.quantity);
                const matchFilter = filter === 'all' || status === filter;
                return matchSearch && matchFilter;
            });

            tbody.innerHTML = filtered.map(item => {
                const status = getStatus(item.quantity);
                return `
                    <tr>
                        <td>#${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.quantity}</td>
                        <td>$${item.price.toFixed(2)}</td>
                        <td><span class="status-badge status-${status}">${getStatusText(item.quantity)}</span></td>
                        <td><button onclick="deleteItem(${item.id})" style="padding: 8px 15px; font-size: 0.9em;">🗑️ Delete</button></td>
                    </tr>
                `;
            }).join('');
        }

        function render3DChart() {
            const chart = document.getElementById('chart3d');
            const topItems = inventory.slice(0, 5);
            const maxQty = Math.max(...topItems.map(i => i.quantity), 1);

            chart.innerHTML = topItems.map(item => {
                const height = (item.quantity / maxQty) * 300;
                return `
                    <div style="position: relative;">
                        <div class="bar-3d" style="height: ${height}px" data-value="${item.quantity}"></div>
                        <div class="bar-label">${item.name.substring(0, 10)}</div>
                    </div>
                `;
            }).join('');
        }

        function openModal() {
            document.getElementById('itemModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
            document.getElementById('productName').value = '';
            document.getElementById('quantity').value = '';
            document.getElementById('price').value = '';
        }

        function addItem() {
            const name = document.getElementById('productName').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const price = parseFloat(document.getElementById('price').value);

            if (!name || isNaN(quantity) || isNaN(price)) {
                alert('Please fill all fields correctly!');
                return;
            }

            const newId = Math.max(...inventory.map(i => i.id)) + 1;
            inventory.push({ id: newId, name, quantity, price });
            
            closeModal();
            updateStats();
            renderTable();
            render3DChart();
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                inventory = inventory.filter(i => i.id !== id);
                updateStats();
                renderTable();
                render3DChart();
            }
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('filterStatus').addEventListener('change', renderTable);

        document.getElementById('itemModal').addEventListener('click', (e) => {
            if (e.target.id === 'itemModal') closeModal();
        });

        updateStats();
        renderTable();
        render3DChart();
    </script>
</body>
</html>
